name: 'truecopy — gate your agent skills'
description: >-
  Verify pinned agent skills & MCP servers for drift and poisoning (truecopy.lock),
  or poison-scan a manifest, skill directory, or cloned marketplace repo.
  The supply-chain gate for AI agents.
author: 'Thomas Sprayberry (askalf)'

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  command:
    description: >-
      What to run. 'verify' re-checks every skill pinned in truecopy.lock for
      drift, poisoning, and publisher trust (the CI gate). 'scan' poison-scans
      sources without needing a lock.
    required: false
    default: 'verify'
  path:
    description: >-
      For 'scan': source(s) to scan — an MCP manifest (.json), a skill
      directory, or a file. One path per line for multiple sources.
    required: false
    default: ''
  marketplace:
    description: >-
      For 'scan': path to a CLONED marketplace or plugin repo to audit. truecopy
      stays offline by design — your workflow checks out the ref you are
      vetting, truecopy scans it.
    required: false
    default: ''
  lock:
    description: >-
      Path to the lockfile (for 'verify'). Leave empty to let truecopy resolve it:
      it prefers truecopy.lock and transparently falls back to an existing
      canon.lock (pre-rename repos), so a repo pinned before the rename keeps
      verifying with zero changes. Set this only to point at a non-default path.
    required: false
    default: ''
  trust:
    description: >-
      Path to a truecopy.trust file for publisher-signature verification
      (optional; a repo-committed truecopy.trust is picked up by truecopy itself).
    required: false
    default: ''
  working-directory:
    description: 'Directory to run truecopy in.'
    required: false
    default: '.'
  truecopy-ref:
    description: >-
      Git ref of askalf/truecopy to install — tag, branch, or commit SHA. This is
      a supply-chain gate: pin a tag or SHA, do not float a branch.
    required: false
    default: 'v0.8.0'

outputs:
  report:
    description: "truecopy's text output (truncated to 64 KiB)."
    value: ${{ steps.run.outputs.report }}

runs:
  using: 'composite'
  steps:
    - name: Install truecopy
      shell: bash
      env:
        TRUECOPY_REF: ${{ inputs.truecopy-ref }}
      run: |
        if ! command -v node >/dev/null 2>&1; then
          echo "::error::node not found on this runner — add an actions/setup-node step (node-version >= 20) before this action"
          exit 1
        fi
        major="$(node -p 'process.versions.node.split(".")[0]')"
        if [ "$major" -lt 20 ]; then
          echo "::error::truecopy needs node >= 20, runner has $(node --version) — add an actions/setup-node step with node-version: 20"
          exit 1
        fi
        npm install -g --no-fund --no-audit "github:askalf/truecopy#${TRUECOPY_REF}"

    - name: Run truecopy
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TRUECOPY_CMD: ${{ inputs.command }}
        TRUECOPY_PATHS: ${{ inputs.path }}
        TRUECOPY_MARKETPLACE: ${{ inputs.marketplace }}
        TRUECOPY_LOCK: ${{ inputs.lock }}
        TRUECOPY_TRUST: ${{ inputs.trust }}
      run: |
        args=()
        case "$TRUECOPY_CMD" in
          verify)
            args=(verify)
            if [ -n "$TRUECOPY_LOCK" ]; then args+=(--lock "$TRUECOPY_LOCK"); fi
            if [ -n "$TRUECOPY_TRUST" ]; then args+=(--trust "$TRUECOPY_TRUST"); fi
            ;;
          scan)
            if [ -z "$TRUECOPY_PATHS" ] && [ -z "$TRUECOPY_MARKETPLACE" ]; then
              echo "::error::command 'scan' needs 'path' and/or 'marketplace'"
              exit 2
            fi
            args=(scan)
            while IFS= read -r p; do
              if [ -n "$p" ]; then args+=("$p"); fi
            done <<< "$TRUECOPY_PATHS"
            if [ -n "$TRUECOPY_MARKETPLACE" ]; then args+=(--marketplace "$TRUECOPY_MARKETPLACE"); fi
            ;;
          *)
            echo "::error::unknown command '$TRUECOPY_CMD' — use 'verify' or 'scan'"
            exit 2
            ;;
        esac

        report="$RUNNER_TEMP/truecopy-report.txt"
        status=0
        truecopy "${args[@]}" 2>&1 | tee "$report" || status=$?

        {
          echo 'report<<TRUECOPY_REPORT_EOF'
          head -c 65536 "$report"
          echo ''
          echo 'TRUECOPY_REPORT_EOF'
        } >> "$GITHUB_OUTPUT"

        {
          if [ "$status" -eq 0 ]; then
            echo "### truecopy $TRUECOPY_CMD — clean ✅"
          else
            echo "### truecopy $TRUECOPY_CMD — FAILED ⛔ (exit $status)"
          fi
          echo ''
          echo '```text'
          head -c 262144 "$report"
          if [ "$(wc -c < "$report")" -gt 262144 ]; then echo '… (truncated)'; fi
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

        rm -f "$report"
        exit "$status"
